# Server
server.port=8080
server.servlet.context-path=/api

# Database - update with your password
spring.datasource.url=jdbc:mysql://localhost:3306/nexkart_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT - exactly 32 characters
nexkart.jwt.secret=NexKartSecretKey12345678901234
nexkart.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
nexkart.upload.dir=uploads/

# CORS
nexkart.cors.allowed-origins=http://localhost:3000

# Logging - set to INFO to reduce noise
logging.level.com.nexkart=INFO
logging.level.org.springframework.security=DEBUG